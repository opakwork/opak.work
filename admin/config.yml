backend:
  name: github
  repo: opakwork/opak.work
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}"
    format: "frontmatter"
    fields:
      - { label: "Date", name: "date", widget: "string" }
      - { label: "PDF Link", name: "pdf", widget: "string" }
      - { label: "Text", name: "text", widget: "text" }
